name: Notion Hour Sync

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Notion Hour Sync
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: python notion-code/notion_hour_sync.py

      # Persist last sync timestamp
      - name: Save sync timestamp
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add notion-code/.last_sync
          git commit -m "Update sync timestamp" || exit 0
          git push